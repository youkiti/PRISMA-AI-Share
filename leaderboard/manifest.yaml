# PRISMA-AI Tsuge MD Validation Leaderboard - Model Manifest
#
# Each entry points to a unified validation JSON produced by the locked Tsuge
# Markdown validation pipeline (10 SRs x 53 items = 530 comparable decisions).
# The aggregator script `analysis/build_leaderboard.py` reads this manifest plus
# `data/pricing/model_pricing.toml` to produce `leaderboard/leaderboard.{md,csv,json}`
# and the per-model experiment logs under `leaderboard/experiments/`.
#
# To add a new model:
#   1. Run the locked Markdown validation on the 10 Tsuge SRs and capture the
#      unified `md_<slug>_<ts>.json` under `test/issues/<issue_dir>/results/`.
#   2. Append a block to this file. `unified_json` is the path relative to the
#      repository root.
#   3. (Optional) add a pricing entry to `data/pricing/model_pricing.toml`.
#   4. Re-run the aggregator with `python analysis/build_leaderboard.py`.

cohort:
  name: tsuge_md_validation_10
  papers:
    - Tsuge2025_PRISMA2020_14
    - Tsuge2025_PRISMA2020_20
    - Tsuge2025_PRISMA2020_22
    - Tsuge2025_PRISMA2020_26
